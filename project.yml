name: Pop
options:
  bundleIdPrefix: app.baomi
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: "en"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.2.2"
    CURRENT_PROJECT_VERSION: "4"
    # Produce a single self-contained executable instead of the split Xcode-16 "debug
    # dylib" (Pop.debug.dylib). That split binary breaks when we re-sign with our stable
    # dev identity (dyld rejects the dylib for a Team-ID mismatch), so disable it.
    ENABLE_DEBUG_DYLIB: NO

targets:
  Pop:
    type: application
    platform: macOS
    sources:
      - Sources/Pop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.baomi.pop
        PRODUCT_NAME: Pop
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: App/Pop.entitlements
        COMBINE_HIDPI_IMAGES: YES

schemes:
  Pop:
    build:
      targets:
        Pop: all
    run:
      config: Debug
