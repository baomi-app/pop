<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18" width="18" height="18">
  <!-- 1. Four corner brackets perfectly symmetrical (14x14 square inset by 2px on all sides), thin and rounded vector paths -->
  <path 
    d="M 2 5.5 L 2 2 L 5.5 2 M 12.5 2 L 16 2 L 16 5.5 M 2 12.5 L 2 16 L 5.5 16 M 12.5 16 L 16 16 L 16 12.5" 
    stroke="#000000" 
    stroke-width="1.5" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
  />

  <!-- 2. Centered, 45-degree tilted official corn cob shape. Tilted clockwise (rotate(45)) to match the App Icon exactly. -->
  <path 
    d="M 9.0 16.5 C 9.0 10.5, 10.0 5.5, 12 5.5 C 14.0 5.5, 15.0 10.5, 15.0 16.5 C 15.0 18.2, 13.8 19, 12 19 C 10.2 19, 9.0 18.2, 9.0 16.5 Z" 
    fill="#000000" 
    transform="translate(9, 9) rotate(45) scale(0.58) translate(-12, -12.25)"
  />
</svg>
