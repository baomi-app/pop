name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Pop.app
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release)
        run: |
          xcodebuild \
            -project Pop.xcodeproj \
            -scheme Pop \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual \
            build

      - name: Verify code signature (identifier must be app.baomi.pop)
        run: |
          IDENTIFIER=$(codesign -dvv .build/Build/Products/Release/Pop.app 2>&1 | awk -F= '/^Identifier=/{print $2}')
          echo "Identifier: $IDENTIFIER"
          test "$IDENTIFIER" = "app.baomi.pop"

      - name: Locate built app
        id: app
        run: echo "path=.build/Build/Products/Release/Pop.app" >> "$GITHUB_OUTPUT"

      - name: Zip app
        run: ditto -c -k --keepParent "${{ steps.app.outputs.path }}" Pop.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pop
          path: Pop.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" Pop.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
